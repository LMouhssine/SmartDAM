<div class="modal fade" id="imageDetailModal" tabindex="-1" aria-labelledby="imageDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content app-modal">
            <div class="modal-header">
                <div>
                    <p class="section-label mb-1">Détail</p>
                    <h2 class="modal-title h5 mb-0" id="imageDetailModalLabel">Aperçu de l’image</h2>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
            </div>
            <div class="modal-body">
                <div class="row g-4 align-items-start">
                    <div class="col-lg-7">
                        <div class="detail-media">
                            <img src="" alt="" id="detailImagePreview">
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <div class="detail-panel">
                            <h3 class="detail-title" id="detailImageTitle">Image</h3>
                            <div class="detail-description mb-4">
                                <p class="section-label mb-1">Description</p>
                                <p class="mb-0" id="detailImageDescription">Aucune description disponible.</p>
                            </div>

                            <dl class="detail-list">
                                <div>
                                    <dt>Créée le</dt>
                                    <dd id="detailImageCreated">-</dd>
                                </div>
                                <div>
                                    <dt>Orientation</dt>
                                    <dd id="detailImageOrientation">-</dd>
                                </div>
                                <div>
                                    <dt>Dimensions</dt>
                                    <dd id="detailImageDimensions">-</dd>
                                </div>
                                <div>
                                    <dt>Personnes</dt>
                                    <dd id="detailImagePeople">-</dd>
                                </div>
                                <div>
                                    <dt>Stockage</dt>
                                    <dd id="detailImageStorage">-</dd>
                                </div>
                                <div>
                                    <dt>Analyse</dt>
                                    <dd id="detailImageAnalysis">-</dd>
                                </div>
                            </dl>

                            <div class="detail-tags">
                                <p class="section-label mb-2">Tags</p>
                                <div class="tag-row" id="detailImageTags"></div>
                            </div>

                            <div class="detail-actions">
                                <a href="#" class="btn btn-outline-secondary" target="_blank" rel="noopener" id="detailImageOpen">Ouvrir l’original</a>
                                <a href="#" class="btn btn-outline-secondary" id="detailImageDownload">Télécharger</a>
                                <button type="button" class="btn btn-outline-secondary" id="detailImageFavorite">
                                    <span id="detailFavoriteLabel">Ajouter aux favoris</span>
                                </button>
                                <button type="button" class="btn btn-outline-secondary" id="detailImageReanalyze">
                                    <span id="detailReanalyzeLabel">Ré-analyser</span>
                                    <span class="spinner-border spinner-border-sm d-none ms-1" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="btn btn-outline-danger" id="detailImageDelete">Supprimer</button>
                            </div>
                            <p class="d-none detail-reanalyze-status" id="detailReanalyzeStatus"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
