<header class="topbar-shell">
    <nav class="topbar">
        <div class="container-xxl topbar__inner">
            <a class="topbar__brand" href="{{ url_for('index') }}">
                <span class="brand-mark">SD</span>
                <span class="brand-title">SmartDAM</span>
            </a>

            <form class="topbar-search" action="{{ url_for('search') }}" method="get" data-loading-form data-loading-message="Recherche en cours...">
                <label class="visually-hidden" for="global-search">Rechercher dans le catalogue</label>
                <input
                    id="global-search"
                    name="q"
                    type="search"
                    class="form-control"
                    placeholder="Rechercher par tags ou description"
                    value="{{ search.params.query }}"
                >
                <input type="hidden" name="people" value="{{ search.params.people }}">
                <input type="hidden" name="food_category" value="{{ search.params.food_category }}">
                <input type="hidden" name="environment" value="{{ search.params.environment }}">
                <input type="hidden" name="orientation" value="{{ search.params.orientation }}">
                <input type="hidden" name="sort" value="{{ search.params.sort }}">
                <input type="hidden" name="favorites" value="{{ '1' if search.favorites_active else '' }}">
                <button type="submit" class="btn btn-primary">Rechercher</button>
            </form>

            <button type="button" class="btn btn-primary topbar__upload" data-bs-toggle="modal" data-bs-target="#uploadModal">
                Importer
            </button>
        </div>
    </nav>
</header>
